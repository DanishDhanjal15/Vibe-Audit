name: Vibe-Audit CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ───────────────────────────── Backend Tests ─────────────────────────────
  backend:
    name: 🐍 Backend Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: vibe-audit-backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: python -m pytest test_main.py test_api.py test_ingestion.py test_scanners.py -v --tb=short

  # ───────────────────────────── Frontend Build ────────────────────────────
  frontend:
    name: ⚛️ Frontend Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: vibe-audit-frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: vibe-audit-frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
