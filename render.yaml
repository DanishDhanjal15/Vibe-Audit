services:
  - type: web
    name: vibe-audit-backend
    env: python
    rootDir: vibe-audit-backend
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python -m uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.0
